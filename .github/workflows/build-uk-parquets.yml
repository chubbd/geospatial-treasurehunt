name: Build UK Overture Parquets

# Builds UK-bbox-filtered, Hilbert-re-sorted Parquet files from the Overture
# Maps public S3 bucket, plus a small DuckLake catalog that points at Overture's
# public S3 Parquet files, and uploads them as GitHub Release assets.
#
# Why a single pre-filtered file per theme?
#   DuckDB-WASM reads one Parquet footer instead of 200+ S3 partition footers,
#   cutting browser query initialisation from ~20–30 s to ~2–5 s.
#
# Why Hilbert re-sort?
#   Overture source files are Hilbert-sorted against a global (world) extent.
#   After filtering to the UK, we re-sort against the UK extent using
#   ST_Hilbert(geometry, ST_Extent(ST_MakeEnvelope(UK_WEST,UK_SOUTH,...)))
#   so that row groups cluster tightly within UK sub-regions. This lets
#   DuckDB-WASM skip far more row groups when users query a city-sized bbox
#   (e.g. "all museums in London"), yielding faster in-browser queries.
#   Using the hardcoded UK bbox as the Hilbert bounds avoids a double-scan.
#
# DuckDB 1.5.1 is used for its improved geospatial handling (ST_Hilbert, full
# GeoParquet read/write, updated spatial extension).
#
# Usage:
#   Trigger manually via "Run workflow" in the Actions UI, optionally overriding
#   the Overture release tag. The workflow creates (or updates) a GitHub Release
#   tagged  overture-uk-{overture_release}  with Parquet assets plus
#   overture_uk.ducklake.
#
# The release tag used here MUST match OVERTURE_RELEASE in index.html.

on:
  workflow_dispatch:
    inputs:
      overture_release:
        description: 'Overture release tag (e.g. 2026-03-18.0)'
        required: true
        default: '2026-03-18.0'

permissions:
  contents: write   # needed to create/update releases

env:
  DUCKDB_VERSION: '1.5.1'
  UK_WEST:  '-8.75'
  UK_SOUTH: '49.80'
  UK_EAST:  '1.90'
  UK_NORTH: '60.95'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install DuckDB CLI
        run: |
          curl -fsSL \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip" \
            -o duckdb.zip
          unzip -q duckdb.zip
          chmod +x duckdb
          ./duckdb --version

      - name: Build UK-filtered Parquets (disabled)
        run: |
          # Disabled while we evaluate whether the DuckLake-only path is fast enough.
          # Keeping the workflow step as a no-op makes it easy to restore the Parquet
          # build later without losing the surrounding workflow structure.

      - name: Build DuckLake catalog
        env:
          OVERTURE_RELEASE: ${{ github.event.inputs.overture_release }}
        run: |
          mkdir -p dist
          BASE="s3://overturemaps-us-west-2/release/${OVERTURE_RELEASE}"

          PREAMBLE="
            INSTALL ducklake;
            LOAD ducklake;
            INSTALL httpfs;
            LOAD httpfs;
            CREATE OR REPLACE SECRET overture_s3 (
              TYPE s3,
              PROVIDER config,
              KEY_ID '',
              SECRET '',
              REGION 'us-west-2',
              USE_SSL true
            );
            SET temp_directory='/tmp';
            SET memory_limit='14GB';
            SET threads=2;
          "

          build_ducklake_table() {
            local theme="$1" type="$2" table="$3"
            local parquet_glob="${BASE}/theme=${theme}/type=${type}/*.parquet"

            echo "==> Building DuckLake metadata for ${table} …"

            # Fetch the full list of matching Parquet files.
            # Filter with grep to discard any non-URL output produced by PREAMBLE
            # statements (e.g. the "true" row emitted by CREATE OR REPLACE SECRET).
            local all_files
            all_files=$(./duckdb -csv -noheader -c "
              ${PREAMBLE}
              SELECT file
              FROM glob('${parquet_glob}')
              ORDER BY file;
            " | grep '^s3://')
            [ -n "${all_files}" ] || { echo "No Parquet files found for ${parquet_glob}"; exit 1; }

            local sample_file
            sample_file=$(echo "${all_files}" | head -1)

            # Create the table schema once using the first file.
            ./duckdb -c "
              ${PREAMBLE}
              ATTACH 'ducklake:dist/overture_uk.ducklake' AS lake;
              CREATE TABLE IF NOT EXISTS lake.${table} AS
              SELECT
              * EXCLUDE (geometry),
              CAST(geometry AS BLOB) AS geometry
              FROM read_parquet('${sample_file}')
              WITH NO DATA;
            " > /dev/null

            # Register each Parquet file individually.
            while IFS= read -r parquet_file; do
              echo "  Adding ${parquet_file} …"
              ./duckdb -c "
                ${PREAMBLE}
                ATTACH 'ducklake:dist/overture_uk.ducklake' AS lake;
                CALL ducklake_add_data_files('lake', '${table}', '${parquet_file}');
              " > /dev/null
            done <<< "${all_files}"
          }

          rm -f dist/overture_uk.ducklake
          ./duckdb -c "
            ${PREAMBLE}
            ATTACH 'ducklake:dist/overture_uk.ducklake' AS lake;
          " > /dev/null

          build_ducklake_table places         place    places_raw
          build_ducklake_table addresses      address  addresses_raw
          build_ducklake_table buildings      building buildings_raw
          build_ducklake_table divisions      division divisions_raw
          build_ducklake_table transportation segment  segments_raw

          echo "--- DuckLake catalog size ---"
          du -sh dist/overture_uk.ducklake

      - name: Verify DuckLake catalog
        env:
          OVERTURE_RELEASE: ${{ github.event.inputs.overture_release }}
        run: |
          echo "--- Verifying DuckLake file registrations ---"
          ./duckdb -c "
            INSTALL ducklake; LOAD ducklake;
            INSTALL httpfs;   LOAD httpfs;
            CREATE OR REPLACE SECRET overture_s3 (
              TYPE s3, PROVIDER config,
              KEY_ID '', SECRET '', REGION 'us-west-2', USE_SSL true
            );
            ATTACH 'ducklake:dist/overture_uk.ducklake' AS lake;
            SELECT table_name, COUNT(*) AS registered_files
            FROM (
              SELECT 'places_raw'      AS table_name, filename FROM ducklake_data_files('lake', 'main', 'places_raw')      UNION ALL
              SELECT 'addresses_raw'   AS table_name, filename FROM ducklake_data_files('lake', 'main', 'addresses_raw')   UNION ALL
              SELECT 'buildings_raw'   AS table_name, filename FROM ducklake_data_files('lake', 'main', 'buildings_raw')   UNION ALL
              SELECT 'divisions_raw'   AS table_name, filename FROM ducklake_data_files('lake', 'main', 'divisions_raw')   UNION ALL
              SELECT 'segments_raw'    AS table_name, filename FROM ducklake_data_files('lake', 'main', 'segments_raw')
            )
            GROUP BY table_name
            ORDER BY table_name;
          "

      - name: Create or update GitHub Release and upload DuckLake catalog
        env:
          GH_TOKEN: ${{ github.token }}
          OVERTURE_RELEASE: ${{ github.event.inputs.overture_release }}
        run: |
          TAG="overture-uk-${OVERTURE_RELEASE}"
          TITLE="Overture UK Data (${OVERTURE_RELEASE})"

          # Create release if it does not already exist; --clobber updates assets.
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TITLE}" \
            --notes "DuckLake catalog built from the \`${OVERTURE_RELEASE}\` Overture release.
          Bounding box: west=${UK_WEST} east=${UK_EAST} south=${UK_SOUTH} north=${UK_NORTH}

          Files:
          - \`overture_uk.ducklake\`" \
            --latest \
            || true   # ignore 'already exists' error

          gh release upload "${TAG}" dist/overture_uk.ducklake \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Commit DuckLake catalog to repo
        env:
          OVERTURE_RELEASE: ${{ github.event.inputs.overture_release }}
        run: |
          cp dist/overture_uk.ducklake overture_uk.ducklake
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git add overture_uk.ducklake
          git commit -m "Update DuckLake catalog for ${OVERTURE_RELEASE}" || echo "No changes"
          git push

