name: "[ARCHIVED] Overture Ducklake

# ──────────────────────────────────────────────────────────────────────────────
# ARCHIVED — This workflow built the DuckLake catalog used by the old
# browser-DuckLake approach.  The active app no longer uses DuckLake; it reads
# directly from Overture S3 and materialises London-scoped tables in-memory.
#
# Kept for reference on the archive/ducklake-browser-approach branch.
# Do not run this on main — it is a no-op stub.
# ──────────────────────────────────────────────────────────────────────────────
#
# Original description:
# Builds UK-bbox-filtered, Hilbert-re-sorted Parquet files from the Overture
# Maps public S3 bucket, plus a small DuckLake catalog that points at Overture's
# public S3 Parquet files, and uploads them as GitHub Release assets.

on:
  workflow_dispatch:
    inputs:
      overture_release:
        description: 'Overture release tag (e.g. 2026-03-18.0)'
        required: true
        default: '2026-03-18.0'

permissions:
  contents: write   # needed to create/update releases

env:
  DUCKDB_VERSION: '1.4.3'
  UK_WEST:  '-8.75'
  UK_SOUTH: '49.80'
  UK_EAST:  '1.90'
  UK_NORTH: '60.95'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # optional, but harmless and useful if you ever need history/tags
      - name: Install DuckDB CLI
        run: |
          curl -fsSL \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip" \
            -o duckdb.zip
          unzip -qo duckdb.zip -d bin
          chmod +x bin/duckdb
          bin/duckdb --version

      - name: Build UK-filtered Parquets (disabled)
        run: |
          # Disabled while we evaluate whether the DuckLake-only path is fast enough.
          # Keeping the workflow step as a no-op makes it easy to restore the Parquet
          # build later without losing the surrounding workflow structure.

      - name: Build DuckLake catalog
        env:
          OVERTURE_RELEASE: ${{ github.event.inputs.overture_release }}
        run: |
          mkdir -p dist
          mkdir -p bin
          
          BASE="s3://overturemaps-us-west-2/release/${OVERTURE_RELEASE}"

          PREAMBLE="
            INSTALL ducklake;
            LOAD ducklake;
            INSTALL httpfs;
            LOAD httpfs;
            CREATE OR REPLACE SECRET overture_s3 (
              TYPE s3,
              PROVIDER config,
              KEY_ID '',
              SECRET '',
              REGION 'us-west-2',
              USE_SSL true
            );
            SET temp_directory='/tmp';
            SET memory_limit='14GB';
            SET threads=2;
          "

          build_ducklake_table() {
            local theme="$1" type="$2" table="$3"
            local parquet_glob="${BASE}/theme=${theme}/type=${type}/*.parquet"

            echo "==> Building DuckLake metadata for ${table} …"

            # Fetch the full list of matching Parquet files.
            # Filter with grep to discard any non-URL output produced by PREAMBLE
            # statements (e.g. the "true" row emitted by CREATE OR REPLACE SECRET).
            local all_files
            all_files=$(bin/duckdb -csv -noheader -c "
              ${PREAMBLE}
              SELECT file
              FROM glob('${parquet_glob}')
              ORDER BY file;
            " | grep '^s3://')
            [ -n "${all_files}" ] || { echo "No Parquet files found for ${parquet_glob}"; exit 1; }

            local sample_file
            sample_file=$(echo "${all_files}" | head -1)

            # Create the table schema once using the first file.
            bin/duckdb -c "
              ${PREAMBLE}
              ATTACH 'ducklake:dist/overture_uk.ducklake' AS lake;
              CREATE TABLE IF NOT EXISTS lake.${table} AS
              SELECT
              * EXCLUDE (geometry),
              CAST(geometry AS BLOB) AS geometry
              FROM read_parquet('${sample_file}')
              WITH NO DATA;
            " > /dev/null

            # Register each Parquet file individually.
            while IFS= read -r parquet_file; do
              echo "  Adding ${parquet_file} …"
              bin/duckdb -c "
                ${PREAMBLE}
                ATTACH 'ducklake:dist/overture_uk.ducklake' AS lake;
                CALL ducklake_add_data_files('lake', '${table}', '${parquet_file}');
              " > /dev/null
            done <<< "${all_files}"
          }

          rm -f dist/overture_uk.ducklake
          bin/duckdb -c "
            ${PREAMBLE}
            ATTACH 'ducklake:dist/overture_uk.ducklake' AS lake;
          " > /dev/null

          build_ducklake_table places         place    places_raw
          build_ducklake_table addresses      address  addresses_raw
          build_ducklake_table buildings      building buildings_raw
          build_ducklake_table divisions      division divisions_raw
          build_ducklake_table transportation segment  segments_raw

          echo "--- DuckLake catalog size ---"
          du -sh dist/overture_uk.ducklake

      - name: Verify DuckLake catalog
        env:
          OVERTURE_RELEASE: ${{ github.event.inputs.overture_release }}
        run: |
          echo "--- Verifying DuckLake file registrations ---"
          bin/duckdb -c "
            INSTALL ducklake; LOAD ducklake;
            INSTALL httpfs;   LOAD httpfs;
            CREATE OR REPLACE SECRET overture_s3 (
              TYPE s3, PROVIDER config,
              KEY_ID '', SECRET '', REGION 'us-west-2', USE_SSL true
            );
            ATTACH 'ducklake:dist/overture_uk.ducklake' AS lake;
            SELECT 'places_raw'    AS table, COUNT(*) AS n FROM lake.places_raw    LIMIT 0;
            SELECT 'addresses_raw' AS table, COUNT(*) AS n FROM lake.addresses_raw LIMIT 0;
            SELECT 'buildings_raw' AS table, COUNT(*) AS n FROM lake.buildings_raw LIMIT 0;
            SELECT 'divisions_raw' AS table, COUNT(*) AS n FROM lake.divisions_raw LIMIT 0;
            SELECT 'segments_raw'  AS table, COUNT(*) AS n FROM lake.segments_raw  LIMIT 0;
          "
      - name: Commit DuckLake catalog to repo
        env:
          OVERTURE_RELEASE: ${{ github.event.inputs.overture_release }}
        run: |
          cp dist/overture_uk.ducklake overture_uk.ducklake
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git add overture_uk.ducklake
          git commit -m "Update DuckLake catalog for ${OVERTURE_RELEASE}" || echo "No changes"
          git push

