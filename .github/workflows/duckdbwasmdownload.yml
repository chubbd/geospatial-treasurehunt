name: Vendor DuckDB-WASM 1.32.0

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create duckdb directory
        run: |
          mkdir -p duckdb

      - name: Download DuckDB-WASM assets
        run: |
          curl -L \
            https://unpkg.com/@duckdb/duckdb-wasm@1.32.0/dist/duckdb-browser.mjs \
            -o duckdb/duckdb-browser.mjs

          curl -L \
            https://unpkg.com/@duckdb/duckdb-wasm@1.32.0/dist/duckdb-eh.wasm \
            -o duckdb/duckdb-eh.wasm

          curl -L \
            https://unpkg.com/@duckdb/duckdb-wasm@1.32.0/dist/duckdb-browser-eh.worker.js \
            -o duckdb/duckdb-browser-eh.worker.js

      - name: Commit vendored DuckDB-WASM
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add duckdb/
          git commit -m "Vendor DuckDB-WASM 1.32.0 (DuckLake 0.4 compatible)" || echo "No changes"
          git push
